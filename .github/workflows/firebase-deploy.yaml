name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main  # Make sure this matches your GitHub branch name
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and Build
        run: |
          cd client
          npm ci
          npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FAIRSIGHT_AI_69B6A }}'
          channelId: live
          projectId: fairsight-ai-69b6a
          entryPoint: ./client